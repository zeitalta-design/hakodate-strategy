<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Inter','Noto Sans JP',-apple-system,sans-serif">
  <rect width="720" height="380" fill="#fff"/>

  <!-- Title -->
  <text x="60" y="44" font-size="18" font-weight="800" fill="#1a2a3a" letter-spacing="-0.3">7月平均気温（2024〜2025平均）</text>
  <text x="60" y="68" font-size="12" fill="#999" font-weight="500">気象庁 月別実績値をもとに作成</text>

  <!-- Grid lines -->
  <line x1="180" y1="100" x2="660" y2="100" stroke="#eee" stroke-width="1"/>
  <line x1="180" y1="170" x2="660" y2="170" stroke="#eee" stroke-width="1"/>
  <line x1="180" y1="240" x2="660" y2="240" stroke="#eee" stroke-width="1"/>

  <!-- Scale labels (right) -->
  <text x="670" y="104" font-size="11" fill="#bbb" font-weight="500" text-anchor="start">30℃</text>
  <text x="670" y="174" font-size="11" fill="#bbb" font-weight="500" text-anchor="start">25℃</text>
  <text x="670" y="244" font-size="11" fill="#bbb" font-weight="500" text-anchor="start">20℃</text>

  <!-- Bars: scale 0℃=310, 35℃=100 => 1℃ = 6px -->
  <!-- 函館 23.8℃ => y=310-(23.8*6)=167.2, h=310-167.2=142.8 -->
  <rect x="60" y="167" width="120" height="143" rx="4" fill="#2d4a6f"/>
  <text x="120" y="155" font-size="22" font-weight="800" fill="#2d4a6f" text-anchor="middle">23.8<tspan font-size="13" font-weight="500" fill="#777">℃</tspan></text>
  <text x="120" y="330" font-size="15" font-weight="700" fill="#1a2a3a" text-anchor="middle">函館</text>

  <!-- 東京 28.6℃ => y=310-(28.6*6)=138.4, h=310-138.4=171.6 -->
  <rect x="260" y="138" width="120" height="172" rx="4" fill="#ddd"/>
  <text x="320" y="126" font-size="22" font-weight="800" fill="#999" text-anchor="middle">28.6<tspan font-size="13" font-weight="500">℃</tspan></text>
  <text x="320" y="330" font-size="15" font-weight="700" fill="#777" text-anchor="middle">東京</text>

  <!-- 京都 29.9℃ => y=310-(29.9*6)=130.6, h=310-130.6=179.4 -->
  <rect x="460" y="131" width="120" height="179" rx="4" fill="#ddd"/>
  <text x="520" y="119" font-size="22" font-weight="800" fill="#999" text-anchor="middle">29.9<tspan font-size="13" font-weight="500">℃</tspan></text>
  <text x="520" y="330" font-size="15" font-weight="700" fill="#777" text-anchor="middle">京都</text>

  <!-- Baseline -->
  <line x1="50" y1="310" x2="650" y2="310" stroke="#ddd" stroke-width="1"/>

  <!-- Difference annotations -->
  <text x="220" y="356" font-size="11" fill="#2d4a6f" font-weight="600" text-anchor="middle">東京より −4.8℃</text>
  <text x="490" y="356" font-size="11" fill="#2d4a6f" font-weight="600" text-anchor="middle">京都より −6.1℃</text>
</svg>
